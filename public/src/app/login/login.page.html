<div class="login-page-container">

  <!-- Background Hero Section -->
  <div class="hero-background">
    <img src="assets/login-hero-bg.png" alt="Hero Background" class="bg-pulse">
  </div>

  <div class="login-content-wrapper">

    <!-- Left Section -->
    <div class="brand-section fade-in-left">
      <div class="brand-content">
        <img src="../../assets/TT_blue_logo.svg" alt="Company Logo" class="brand-logo">
        <h1 class="brand-title">Welcome Back</h1>
        <p class="brand-subtitle">
          Experience the future of HR Management with MasterHRMS.
        </p>
      </div>
    </div>

    <!-- Right Section -->
    <div class="login-form-section fade-in-right">

      <div class="flip-container" [class.is-flipped]="showForgotPassword">

        <div class="flipper">

          <!-- FRONT FACE : LOGIN -->
          <div class="front-face login-glass-card">

            <div class="card-header">
              <img src="../../assets/TT_blue_logo.svg" class="mobile-logo" alt="Logo">
              <h2 class="form-title">Log into your account</h2>
              <p class="form-subtitle">Enter your credentials to continue</p>
            </div>

            <!-- LOGIN FORM -->
            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="form-body">

              <!-- USERNAME -->
              <div class="form-field">
                <label for="email">Username / Employee ID</label>

                <div class="input-wrapper">
                  <input id="email" type="text" formControlName="email" placeholder="Enter your username or ID"
                    [readonly]="emailChecked" autofocus (keydown)="onKeyPress($event)" />
                  <span class="focus-border"></span>
                </div>

                <small class="field-error" *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid">
                  Username is required
                </small>
              </div>

              <!-- PASSWORD -->
              <div class="form-field staggered-fade-in" *ngIf="showPassword">
                <label for="password">Password</label>

                <div class="input-wrapper">
                  <input id="password" type="password" formControlName="password" placeholder="Enter password" />
                  <span class="focus-border"></span>
                </div>
              </div>

              <!-- CREATE PASSWORD -->
              <div class="form-field staggered-fade-in" *ngIf="showCreatePassword">
                <label for="createPassword">Create Password</label>

                <div class="input-wrapper">
                  <input id="createPassword" type="password" formControlName="password" placeholder="Create password" />
                  <span class="focus-border"></span>
                </div>
              </div>

              <!-- ACTION BUTTONS -->
              <div class="form-actions">

                <!-- NEXT -->
                <button type="button" class="primary-button" *ngIf="!emailChecked && !showForgotPassword"
                  (click)="onNext()" [disabled]="loginForm.get('email')?.invalid">
                  <span>Next</span>
                  <i class="icon-arrow-right"></i>
                </button>

                <!-- LOGIN -->
                <button type="submit" class="primary-button" *ngIf="showPassword" [disabled]="loading">
                  <span *ngIf="!loading">Login</span>
                  <span *ngIf="loading" class="loader"></span>
                </button>

                <!-- CREATE ACCOUNT -->
                <button type="submit" class="primary-button outline" *ngIf="showCreatePassword" [disabled]="loading">
                  <span *ngIf="!loading">Create & Login</span>
                  <span *ngIf="loading" class="loader"></span>
                </button>

              </div>

              <!-- FORGOT PASSWORD -->
              <div class="form-footer">
                <button type="button" class="text-link" (click)="showForgotPasswordForm()">
                  Forgot Password?
                </button>
              </div>

            </form>
          </div>

          <!-- BACK FACE : RESET PASSWORD -->
          <div class="back-face login-glass-card">

            <form [formGroup]="forgotPasswordForm" (ngSubmit)="onForgotPasswordSubmit()" class="form-body">

              <div class="reset-header">
                <h3>Reset Password</h3>
                <p>Enter your details to create a new password</p>
              </div>

              <!-- USERNAME -->
              <div class="form-field">
                <label>Username</label>

                <div class="input-wrapper">
                  <input type="text" formControlName="employee_id" placeholder="Enter your username" />
                  <span class="focus-border"></span>
                </div>
              </div>

              <!-- NEW PASSWORD -->
              <div class="form-field">
                <label>New Password</label>

                <div class="input-wrapper">
                  <input type="password" formControlName="password" placeholder="Enter new password" />
                  <span class="focus-border"></span>
                </div>
              </div>

              <!-- ACTION BUTTONS -->
              <div class="form-actions vertical">

                <button type="submit" class="primary-button" [disabled]="forgotPasswordForm.invalid || loading">
                  <span *ngIf="!loading">Reset Password</span>
                  <span *ngIf="loading" class="loader"></span>
                </button>

                <button type="button" class="secondary-button" (click)="hideForgotPasswordForm()">
                  Cancel
                </button>

              </div>

            </form>
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
