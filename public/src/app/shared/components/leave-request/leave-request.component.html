<form class="premium-form-container" [formGroup]="leaveForm">

  <div class="form-header-premium">
    <div class="header-text">
      <h2>New Leave Request</h2>
      <p>Please provide the details for your time off</p>
    </div>
  </div>

  <div class="form-section">
    <!-- Leave Type -->
    <div class="input-group full-width">
      <label class="premium-label">Leave Type</label>
      <div class="custom-select-wrapper">
        <ion-select formControlName="leave_type" placeholder="Select Leave Type" interface="popover"
          class="premium-input">
          <ion-select-option *ngFor="let leave of leaveTypes" [value]="leave.id" [disabled]="leave.available <= 0">
            {{ leave.name }} ({{ leave.available }} available)
          </ion-select-option>
        </ion-select>
        <ion-icon name="chevron-down-outline" class="input-icon select-chevron"></ion-icon>
      </div>
    </div>

    <!-- Dates -->
    <div class="date-row">
      <div class="input-group half-width">
        <label class="premium-label">From Date</label>
        <div class="premium-input-wrapper">
          <ion-icon name="calendar-clear-outline" class="input-icon-left"></ion-icon>
          <ion-input id="from-input" class="premium-input with-left-icon with-cursor" placeholder="Start Date" readonly
            [value]="selectedDateFrom ? (selectedDateFrom | date:'dd MMM yyyy') : ''"></ion-input>
        </div>
        <ion-popover #fromPopover trigger="from-input" class="premium-popover" triggerAction="click">
          <ng-template>
            <ion-datetime (ionChange)="onDateChangeFrom($event, fromPopover)" [isDateEnabled]="isDateEnabled"
              [highlightedDates]="highlightedDates" presentation="date"></ion-datetime>
            <div class="datetime-footer">
            </div>
          </ng-template>
        </ion-popover>
      </div>

      <div class="input-group half-width">
        <label class="premium-label">To Date</label>
        <div class="premium-input-wrapper">
          <ion-icon name="calendar-outline" class="input-icon-left"></ion-icon>
          <ion-input id="to-input" class="premium-input with-left-icon with-cursor" placeholder="End Date" readonly
            [value]="selectedDateTo ? (selectedDateTo | date:'dd MMM yyyy') : ''"></ion-input>
        </div>
        <ion-popover #toPopover trigger="to-input" class="premium-popover" triggerAction="click">
          <ng-template>
            <ion-datetime [min]="leaveForm.value.start_date" (ionChange)="onDateChangeTo($event, toPopover)"
              [isDateEnabled]="isDateEnabled" [highlightedDates]="highlightedDates" presentation="date"></ion-datetime>
            <div class="datetime-footer">
              <span class="highlight-off"></span>
            </div>
          </ng-template>
        </ion-popover>
      </div>
    </div>

    <!-- Total Days -->
    <div *ngIf="total_days > 0" class="total-days-badge fade-in">
      <div class="badge-icon">
        <ion-icon name="time-outline"></ion-icon>
      </div>
      <div class="badge-content">
        <span class="badge-title">Duration</span>
        <span class="badge-value">{{ total_days }} {{ total_days === 1 ? 'Day' : 'Days' }}</span>
      </div>
    </div>

    <!-- Reason -->
    <div class="input-group full-width">
      <label class="premium-label">Reason for Leave <span class="required-asterisk">*</span></label>
      <div class="premium-textarea-wrapper">
        <ion-textarea class="premium-textarea" placeholder="Please elaborate on the reason for this request..."
          formControlName="remarks" (ionInput)="validateWordLimit($event)" rows="4"></ion-textarea>
        <div class="word-count" [class.warning]="wordsCount > 90">
          {{ wordsCount }} / 100
        </div>
      </div>
    </div>
  </div>

  <div class="form-actions">
    <ion-button class="submit-btn" expand="block" (click)="submitRequest()" [disabled]="leaveForm.invalid">
      Submit Leave Request
      <ion-icon name="arrow-forward-outline" slot="end"></ion-icon>
    </ion-button>
  </div>
</form>
